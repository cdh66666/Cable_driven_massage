<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>USB轨迹调试端</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#eef0f3;color:#111}
main{max-width:1180px;margin:0 auto;padding:22px;display:grid;grid-template-columns:310px 1fr;gap:20px}
.panel{background:#fff;border:1px solid #d8dde3;border-radius:8px;padding:14px}
h1{font-size:23px;margin:0 0 14px}
button,input{width:100%;font-size:15px}
button{height:42px;border:0;border-radius:7px;background:#111;color:#fff;font-weight:700;margin:6px 0}
button.secondary{background:#4b5563}
button.stop{background:#991b1b}
button.green{background:#047857}
button:disabled{opacity:.45}
input{height:36px;margin:6px 0 12px}
#pad{width:100%;aspect-ratio:1/1;background:#fff;border:2px solid #111;display:block}
#status{white-space:pre-wrap;line-height:1.45;font-size:14px;color:#222;margin-top:10px;min-height:160px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.muted{color:#555;font-size:13px;line-height:1.45}
</style>
</head>
<body>
<main>
  <section class="panel">
    <h1>USB轨迹调试端</h1>
    <div class="row">
      <button id="connect">连接USB串口</button>
      <button id="disconnect" class="secondary">断开</button>
    </div>
    <label>轨迹 TXT / JSON</label>
    <input id="file" type="file" accept=".txt,.json,text/plain,application/json">
    <button id="upload">上传轨迹到板子</button>
    <div class="row">
      <button id="start" class="green">开始</button>
      <button id="stop" class="stop">停止</button>
    </div>
    <div class="row">
      <button id="loopOn" class="secondary">循环开</button>
      <button id="loopOff" class="secondary">循环关</button>
    </div>
    <button id="statusBtn" class="secondary">读取状态</button>
    <p class="muted">这个页面直接使用浏览器 Web Serial 访问开发板 USB 串口，不需要手机连接热点。Edge / Chrome 会要求你手动授权一次串口。</p>
    <div id="status">请先点击“连接USB串口”，选择 COM52 或开发板对应串口。</div>
  </section>
  <section class="panel">
    <canvas id="pad" width="900" height="900"></canvas>
  </section>
</main>
<script>
const CANVAS_MM = 150;
const MAX_POINTS = 200000;
const statusEl = document.getElementById('status');
const fileInput = document.getElementById('file');
const pad = document.getElementById('pad');
const ctx = pad.getContext('2d');
let strokes = [];
let serialPort = null;
let writer = null;
let serialReader = null;
let disconnecting = false;
let readBuffer = '';
let pending = [];
let boardOnline = false;

function sleep(ms){
  return new Promise(resolve => setTimeout(resolve, ms));
}

function setStatus(text){ statusEl.textContent = text; }
function addStatus(text){ statusEl.textContent = (text + '\n' + statusEl.textContent).slice(0, 5000); }

function draw(){
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, pad.width, pad.height);
  ctx.strokeStyle = '#111';
  ctx.lineWidth = 2;
  ctx.strokeRect(34, 34, pad.width - 68, pad.height - 68);
  ctx.save();
  ctx.translate(34, 34);
  const scale = (pad.width - 68) / CANVAS_MM;
  ctx.strokeStyle = '#111';
  ctx.lineWidth = 1.1;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  for (const stroke of strokes) {
    if (stroke.length < 2) continue;
    ctx.beginPath();
    ctx.moveTo(stroke[0].x * scale, (CANVAS_MM - stroke[0].y) * scale);
    for (let i = 1; i < stroke.length; i++) {
      ctx.lineTo(stroke[i].x * scale, (CANVAS_MM - stroke[i].y) * scale);
    }
    ctx.stroke();
  }
  ctx.restore();
}

function parsePoint(point){
  if (Array.isArray(point)) return {x: +point[0], y: +point[1]};
  return {x: +point.x, y: +point.y};
}

function parseTrajectory(text){
  const trimmed = text.trim();
  if (!trimmed) return [];
  if (trimmed[0] === '[') {
    const value = JSON.parse(trimmed);
    if (value.length && !Array.isArray(value[0])) return [];
    if (value.length && value[0].x !== undefined) return [value.map(parsePoint)];
    return value.map(stroke => stroke.map(parsePoint)).filter(stroke => stroke.length >= 2);
  }
  return trimmed.split(/\r?\n/)
    .map(line => line.trim())
    .filter(Boolean)
    .map(line => line.split(';').map(pair => {
      const [x, y] = pair.split(',').map(Number);
      return {x, y};
    }).filter(p => Number.isFinite(p.x) && Number.isFinite(p.y)))
    .filter(stroke => stroke.length >= 2);
}

function flattenBinary(source){
  const count = source.reduce((sum, stroke) => sum + (stroke.length >= 2 ? stroke.length : 0), 0);
  if (count < 2) throw new Error('轨迹太短');
  if (count > MAX_POINTS) throw new Error(`点数 ${count} 超过板子上限 ${MAX_POINTS}`);
  const bytes = new Uint8Array(count * 5);
  const view = new DataView(bytes.buffer);
  let offset = 0;
  for (const stroke of source) {
    if (stroke.length < 2) continue;
    for (let i = 0; i < stroke.length; i++) {
      const x100 = Math.max(0, Math.min(Math.round(stroke[i].x * 100), CANVAS_MM * 100));
      const y100 = Math.max(0, Math.min(Math.round(stroke[i].y * 100), CANVAS_MM * 100));
      view.setUint16(offset, x100, true);
      view.setUint16(offset + 2, y100, true);
      view.setUint8(offset + 4, i === 0 ? 0 : 1);
      offset += 5;
    }
  }
  return {bytes, count};
}

function handleLine(line){
  if (!line) return;
  addStatus(line);
  if (line.startsWith('USBREADY') || line.startsWith('USBSTATUS') || line.startsWith('USBBIN') || line.startsWith('Web ')) {
    boardOnline = true;
  }
  const keep = [];
  for (const item of pending) {
    if (item.prefixes.some(prefix => line.startsWith(prefix))) {
      item.resolve(line);
      clearTimeout(item.timer);
    } else {
      keep.push(item);
    }
  }
  pending = keep;
}

async function readLoop(){
  const decoder = new TextDecoder();
  while (serialPort && serialPort.readable) {
    const reader = serialPort.readable.getReader();
    serialReader = reader;
    try {
      while (true) {
        const {value, done} = await reader.read();
        if (done) break;
        readBuffer += decoder.decode(value, {stream:true});
        const lines = readBuffer.split(/\r?\n/);
        readBuffer = lines.pop() || '';
        for (const line of lines) handleLine(line.trim());
      }
    } catch (err) {
      addStatus(`读取中断: ${err.message || err}`);
    } finally {
      try { reader.releaseLock(); } catch (err) {}
      if (serialReader === reader) serialReader = null;
    }
  }
}

function waitFor(prefixes, timeoutMs){
  return new Promise((resolve, reject) => {
    const timer = setTimeout(() => {
      pending = pending.filter(item => item.resolve !== resolve);
      reject(new Error(`等待板子回复超时: ${prefixes.join(' / ')}`));
    }, timeoutMs);
    pending.push({prefixes, resolve, timer});
  });
}

async function connect(){
  if (!('serial' in navigator)) {
    setStatus('当前浏览器不支持 Web Serial，请用新版 Edge 或 Chrome 打开。');
    return;
  }
  if (serialPort) await disconnect();
  try {
    serialPort = await navigator.serial.requestPort({filters:[{usbVendorId:0x1a86}]});
  } catch (err) {
    serialPort = await navigator.serial.requestPort();
  }
  await serialPort.open({baudRate: 460800, bufferSize: 65536});
  disconnecting = false;
  writer = serialPort.writable.getWriter();
  boardOnline = false;
  setStatus('USB串口已连接，正在探测板子...');
  readLoop();
  try {
    for (let i = 0; i < 8 && !boardOnline; i++) {
      try {
        await sendLine('usbstatus', ['USBREADY', 'USBSTATUS'], 1200);
      } catch (err) {
        await sleep(500);
      }
    }
    if (!boardOnline) throw new Error('probe timeout');
    addStatus('板子通信正常。可以选择轨迹文件并上传。');
  } catch (err) {
    addStatus('没有收到板子 USBREADY/状态。请按一下板子复位键；如果仍不行，说明当前串口不是 CH343 的 COM52。');
  }
}

async function disconnect(){
  disconnecting = true;
  pending.forEach(item => clearTimeout(item.timer));
  pending = [];
  boardOnline = false;
  if (serialReader) {
    try { await serialReader.cancel(); } catch (err) {}
  }
  if (writer) {
    try { writer.releaseLock(); } catch (err) {}
    writer = null;
  }
  if (serialPort) {
    try {
      await serialPort.close();
      serialPort = null;
    } catch (err) {
      addStatus(`断开失败: ${err.message || err}。请直接关闭这个网页标签页释放串口。`);
      return;
    }
  }
  setStatus('USB串口已断开。现在可以烧录固件，或者重新连接调试。');
}

async function sendLine(command, prefixes = [], timeoutMs = 5000){
  if (!writer) throw new Error('请先连接USB串口');
  const wait = prefixes.length ? waitFor(prefixes, timeoutMs) : null;
  await writer.write(new TextEncoder().encode(command.trim() + '\n'));
  return wait ? await wait : 'OK';
}

async function ensureBoardOnline(){
  if (boardOnline) return;
  for (let i = 0; i < 3; i++) {
    try {
      await sendLine('usbstatus', ['USBSTATUS'], 2500);
      return;
    } catch (err) {
      await sleep(500);
    }
  }
  throw new Error('没有收到板子回复。请重新点“连接USB串口”，并选择 COM52 / USB-Enhanced-SERIAL CH343。');
}

async function upload(){
  if (!writer) throw new Error('请先连接USB串口');
  const file = fileInput.files[0];
  if (!file) throw new Error('请先选择轨迹 TXT 或 JSON');
  strokes = parseTrajectory(await file.text());
  draw();
  const {bytes, count} = flattenBinary(strokes);
  setStatus(`正在上传 ${strokes.length} 段，${count} 点...`);
  await ensureBoardOnline();
  const ready = await sendLine(`USBBIN ${count}`, ['USBBIN READY', 'USBBIN ERROR'], 12000);
  if (ready.startsWith('USBBIN ERROR')) throw new Error(ready);
  await writer.write(bytes);
  const done = await waitFor(['USBBIN OK', 'USBBIN ERROR'], 20000);
  if (done.startsWith('USBBIN ERROR')) throw new Error(done);
  addStatus(`上传完成: ${done}`);
}

async function runTask(task){
  try { await task(); }
  catch (err) { addStatus(`错误: ${err.message || err}`); }
}

document.getElementById('connect').onclick = () => runTask(connect);
document.getElementById('disconnect').onclick = () => runTask(disconnect);
document.getElementById('upload').onclick = () => runTask(upload);
document.getElementById('start').onclick = () => runTask(() => sendLine('webstart', ['Web playback', 'No playable'], 5000));
document.getElementById('stop').onclick = () => runTask(() => sendLine('webstop', ['Web playback stopped'], 5000));
document.getElementById('loopOn').onclick = () => runTask(() => sendLine('loopon', ['USBSTATUS loop=1'], 5000));
document.getElementById('loopOff').onclick = () => runTask(() => sendLine('loopoff', ['USBSTATUS loop=0'], 5000));
document.getElementById('statusBtn').onclick = () => runTask(() => sendLine('usbstatus', ['USBSTATUS'], 5000));
fileInput.onchange = () => runTask(async () => {
  const file = fileInput.files[0];
  if (!file) return;
  strokes = parseTrajectory(await file.text());
  draw();
  const points = strokes.reduce((sum, stroke) => sum + stroke.length, 0);
  setStatus(`已载入预览: ${file.name}\n轨迹段: ${strokes.length}\n点数: ${points}`);
});

draw();
window.addEventListener('beforeunload', () => {
  if (writer) {
    try { writer.releaseLock(); } catch (err) {}
  }
  if (serialPort) {
    try { serialPort.close(); } catch (err) {}
  }
});
</script>
</body>
</html>
